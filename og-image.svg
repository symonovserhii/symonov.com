<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b0f14"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow -->
  <circle cx="200" cy="100" r="300" fill="rgba(0,212,255,0.06)"/>
  <circle cx="900" cy="500" r="250" fill="rgba(123,97,255,0.05)"/>
  <!-- Content -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#e8edf2">Symonov</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="#5a6a7a">Full-Stack Development</text>
  <!-- Accent line -->
  <rect x="80" y="380" width="60" height="3" rx="1.5" fill="#00d4ff"/>
  <!-- Tagline -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#5a6a7a">WordPress plugins · Laravel platforms · Telegram Mini Apps</text>
  <!-- URL -->
  <text x="80" y="560" font-family="monospace" font-size="18" fill="#3a4a5a">symonov.com</text>
  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1e2a35" stroke-width="2"/>
</svg>
